name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Bump GALA_VERSION whenever a new gala release ships. Keep it in lockstep
# with the `gala` line in gala.mod / the `gala` bazel_dep in MODULE.bazel.
env:
  GALA_VERSION: "0.60.0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install GALA CLI
        run: |
          curl -fsSL -o /usr/local/bin/gala \
            "https://github.com/martianoff/gala/releases/download/${GALA_VERSION}/gala-linux-amd64"
          chmod +x /usr/local/bin/gala
          gala version

      - name: Test
        run: gala test
